<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PDA OS Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="pda">
        <!-- Левая панель: задачи -->
        <div id="tasks-panel">
            <h2>Задачи</h2>
            <ul id="tasks-list">
                <li class="task">Убейте кровососов</li>
                <li class="task">Убейте Стрелка</li>
                <li class="task">Найдите семейную винтовку</li>
            </ul>
        </div>

        <!-- Правая панель: карта -->
        <div id="map-panel">
            <div id="map-header">
                <h2>Карта Красноярска</h2>
                <button id="theme-toggle">Сменить тему</button>
            </div>
            <div id="map-container">
                <img id="map-image" src="https://avatars.mds.yandex.net/i?id=fe8d9f89037f22228d1e793635065932_l-5597619-images-thumbs&n=33&w=1554&h=1080" alt="Карта Красноярска">
            </div>
        </div>
    </div>

    <!-- Нижняя навигация -->
    <div id="bottom-nav">
        <button class="tab-btn" data-tab="tasks">Tasks</button>
        <button class="tab-btn" data-tab="map">Map</button>
        <button class="tab-btn" data-tab="diary">Diary</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
    </div>

    <script src="main.js"></script>
</body>
</html>
